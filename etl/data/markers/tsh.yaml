# Source: thyroid_panel.md §1.3 Reference ranges, §1.5 Mortality outcomes, §1.7 Optimal range.
# Reference 0.4-4.5 mIU/L per Quest/LabCorp convention; optimal 1.0-2.5 mIU/L per Attia/
# Function Health framing aligned with Xu 2023 IPD meta-analysis mortality nadir (~1.9-2.9).
# Age modifier: TSH distribution shifts ~0.3 mIU/L higher per decade after age 30 (Surks 2007).

id: tsh
name: Thyroid-Stimulating Hormone
panel: thyroid
units: mIU/L
direction: in_band
ref_lo: 0.4
ref_hi: 4.5
opt_lo: 1.0
opt_hi: 2.5
immutable: false
demographic_modifiers:
  - trait: age_over_65
    opt_lo: 1.0
    opt_hi: 4.0
