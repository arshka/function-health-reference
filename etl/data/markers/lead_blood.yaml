# Source: heavy_metals_and_biological_age.md §1.5–1.6; lead_blood.md §6.
# No safe threshold — Lanphear 2018 Lancet PH showed mortality gradient even at
# BLL <5 µg/dL. CDC BLRV (children) 3.5 µg/dL (97.5th pct NHANES). LabCorp adult
# "normal" <5 µg/dL (statistical, not biological). NHANES adult GM 0.86 µg/dL.
# Realistic optimum: as low as detection allows (<1 µg/dL). Mutable via source
# removal (water filter, audit housing/hobbies/spices/Ayurvedic supplements).

