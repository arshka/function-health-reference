# Source: heart_lipids_basic.md §HDL-C, ATP-III / AHA guidelines.
# HDL is the only commonly-measured lipid where HIGHER is better.
# Note: very high HDL (>100) loses its protective association in MR studies — use in_band would be safer,
# but for v1 we use higher_is_better with an upper cap at ref_hi.

id: hdl_c
name: HDL Cholesterol
panel: cardiovascular
units: mg/dL
direction: higher_is_better
ref_lo: 30
ref_hi: 100
opt_lo: 50
opt_hi: 100
immutable: false
demographic_modifiers:
  - trait: male
    opt_lo: 40
    opt_hi: 100
