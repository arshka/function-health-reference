# Non-smoker blood Cd geometric mean ~0.3 µg/L; smokers ~1.5 µg/L (NHANES). Lab
# reference upper bound ~5 µg/L; optimal <1 µg/L. Mutable — smoking cessation
# halves blood Cd over ~1 year; iron sufficiency (ferritin >30 µg/L) cuts GI
# absorption ~30–50%. Kidney cortex burden persists for decades.

