# Source: prostate_psa.md §1, §4; biomarker_interventions/autoimmunity_psa/PSA_free.md §6
# Absolute free PSA (the unbound fraction). Typical healthy young men: ~0.1-0.3 ng/mL.
# Free PSA tracks total PSA proportionally; clinical interpretation uses the ratio (%fPSA).
# lower_is_better because absolute free PSA rises with total PSA elevations.
# Sex: skip if female (no prostate tissue).

id: psa_free
name: Prostate-Specific Antigen, Free
panel: autoimmunity_psa
units: ng/mL
direction: lower_is_better
ref_lo: 0
ref_hi: 2.0
opt_lo: 0
opt_hi: 0.5
immutable: false
demographic_modifiers:
  - trait: female
    skip: true
