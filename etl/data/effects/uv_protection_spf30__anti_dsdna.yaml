# Source: biomarker_interventions/autoimmunity_psa/anti_dsDNA.md §4 (activities)
# UV protection (SPF >=30 broad spectrum + UV-protective clothing): UV
# exposure -> keratinocyte apoptosis -> exposure of nuclear antigens ->
# flares of cutaneous and systemic SLE; 40-70% of SLE patients are
# photosensitive. Prevents flares and new anti-dsDNA generation in active
# disease. Foundational SLE intervention but no RCT with titer as primary
# endpoint -- effect is via flare prevention so bounds are conservative.
