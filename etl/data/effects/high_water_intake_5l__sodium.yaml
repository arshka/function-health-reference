# Source: biomarker_interventions/kidney_electrolytes_pancreas/sodium.md §1 (Foods/patterns that LOWER serum Na)
# Sustained high water intake (>4-6 L/d in healthy person): Serum Na ↓ 1-2 mmol/L baseline.
# Mechanism: ADH suppression → free water excretion; healthy kidneys excrete ~750-1000 mL/h.
# Note: marker is in_band; this lowers Na, beneficial only when baseline is elevated (mild dehydration).
# Lean baseline (Na 138-140) would be pushed toward hyponatremia — apply with caution; lean modifier reduced.

