# Note: Toulis 2010 meta found NO significant TgAb effect in primary analysis.
# Karanikas 2008 (n=36) and Nordio 2017 trials suggest modest reduction.
# TgAb is the less responsive antibody to selenium vs TPO Ab.
# Tagged one_trial (not meta) because the meta-analysis primary endpoint was null;
# only secondary single trials show modest reduction. Bounds reflect this uncertainty (0 allowed).
