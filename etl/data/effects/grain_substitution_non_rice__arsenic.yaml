# Substituting other grains (oats, quinoa, barley, millet, buckwheat, sorghum,
# amaranth, wheat) for rice as primary starch. Non-rice grains have ~5-10x lower
# iAs than rice; iAs intake ↓ ~80-90% if rice was the primary starch. Clamped to
# -60% per validator magnitude ceiling.
