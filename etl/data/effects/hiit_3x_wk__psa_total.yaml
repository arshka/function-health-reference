# Source: biomarker_interventions/autoimmunity_psa/PSA_total.md §4
# ERASE trial (Kang 2021, n=52, 12 wk HIIT in active surveillance PCa):
# PSA, PSA velocity, and LNCaP cell growth all reduced vs. usual-care control.
# Magnitude not given as a precise %; modeled as a modest decrease bounded by
# the typical small-effect range from similar exercise oncology trials. Effect
# in healthy men with low baseline PSA likely much smaller (floor effects).

