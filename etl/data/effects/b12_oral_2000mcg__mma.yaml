# Oral high-dose 2000 µg/d cyanocobalamin in pernicious anemia: MMA normalizes
# equivalently to IM at ≥3 months (Vidal-Alaball Cochrane 2005). At this dose
# ~40 µg absorbed via passive diffusion — adequate even without intrinsic factor.
# Bounds match IM equivalence (50-60%, clamped to -60% validator cap).

