# Source: biomarker_interventions/autoimmunity_psa/PSA_total.md §1
# Cooked tomato products / lycopene. Pre-prostatectomy 3-wk RCT (Kucuk 2001):
# PSA -18% in tomato extract arm. Italian RCT in PCa: median -1% in highest plasma
# lycopene rise quartile vs +8.5% in lowest. Single-trial level evidence; effects
# strongest in elevated baselines (PCa) and likely much smaller / floor-limited in
# healthy young men with low baseline PSA.

intervention_id: tomato_paste_60g
