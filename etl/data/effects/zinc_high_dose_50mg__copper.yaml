# Source: biomarker_interventions/vitamins_minerals/copper.md §2 (foods/conditions that LOWER copper)
# Chronic high-dose zinc (>40 mg/d, especially >100 mg/d) progressively lowers serum Cu via
# enterocyte metallothionein induction trapping Cu. Mechanism: high gastric Zn induces MT in
# enterocytes which preferentially binds Cu → Cu trapped in shed enterocytes.
# Effect develops over months to years; magnitude can drop Cu well below normal in extreme cases.

