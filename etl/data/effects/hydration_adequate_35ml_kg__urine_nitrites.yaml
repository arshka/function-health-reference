# Source: biomarker_interventions/urinalysis/urine_nitrites.md §1, §4
# Hooton 2018 RCT: +1.5 L/d water → UTI recurrence ↓ ~48% in premenopausal women.
# Nitrite positivity is downstream of UTI (gram-negative bacteriuria), so UTI
# reduction maps to lower nitrite-positive probability.

